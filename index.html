<!DOCTYPE html>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap');

            -webkit-touch-callout: none;

        @keyframes bounceIn {

            transform: translate(-50%, -50%) scale(0); /* Start from center with scale 0 */

          100% {

        .popup {

            margin-left: 10px;

            width: 100%;

            color: #6CA9F8;

            position: relative;

            margin-bottom: 0;

        #successMessage {
            display: none;
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: rgba(4, 167, 68, 0.9);
            color: white;
            padding: 10px 20px;
            border-radius: 3px;
            animation: slideIn 0.5s ease forwards;

        .progressBar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px; /* Height of the progress bar */
            background-color: #186311; /* Color of the progress bar */
            animation: progressBar 3s linear forwards; /* Duration of the progress bar animation */
        }
        @keyframes progressBar {
            0% {
                width: 100%; /* Start position of the progress bar */
            }
            100% {
                width: 0; /* End position of the progress bar */
            }
        }

        @keyframes slideIn {
            0% {
                transform: translateX(100%);
                opacity: 0;
            }
            100% {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes slideOut {
            0% {
                transform: translateX(0);
                opacity: 1;
            }
            100% {
                transform: translateX(100%);
                opacity: 0;
            }
        }
        #loadingScreen {
            display: flex;
            align-items: center;
            justify-content: center;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #1D1E22; /* Change to match the background color of your website */
            z-index: 9999;
            overflow: hidden; /* Ensure the background fills the whole viewport */

        #loadingScreen .bbb {
            background-color: #1C1E22;
            width: 300px;
            padding: 20px;
            text-align: center;
            item-align: center;
            border-radius: 10px;
        }

        #loadingScreen h2 {
            margin-top: 0;
            color: #A4A9C5;
        }

        #loadingScreen img {
            width: 90px;
            height: 90px;
            margin: 0 auto;
            display: block;
            item-align: center;
            animation: rotateIcon 4s linear infinite;
        }

        @keyframes rotateIcon {
            0% {
                transform: rotate(0deg);
            }
            25% {
                transform: rotate(60deg);
            }
            50% {
                transform: rotate(0deg);
            }
            75% {
                transform: rotate(-60deg);
            }
            100% {
                transform: rotate(0deg);
            }
        }

        #loadingScreen p {
            margin-top: 10px;
            color: #A4A9C5;
        }
        .ldng {
            width: 300px;
            padding: 20px;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .loading-animation {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .loader {
            font-size: 36px;
            opacity: 0;
            animation: spin 2s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(90deg); }
            50% { transform: rotate(180deg); }
            75% { transform: rotate(270deg); }
            100% { transform: rotate(360deg); }
        }

        .loader:nth-child(2) {
            animation-delay: 0.25s;
        }

        .loader:nth-child(3) {
            animation-delay: 0.5s;
        }

        .loader:nth-child(4) {
            animation-delay: 0.75s;
        }
        .hamburger-icon {
            position: absolute;
            top: 20px;
            left: 20px;
            cursor: pointer;
            color: #fff;
            font-size: 24px;
        }

        .dropdown-menu {
            padding: 10px;
            position: fixed;
            top: 0;
            left: -300px;l
            width: 300px;
            height: 100%;
            background-color: #121316;
            transition: left 0.3s ease;
            z-index: 999;
        }

    </style>
</head>

</div><hr>
    
<div id="pixxalsContainer"></div>


<script>
    // Function to calculate relative time
    function timeAgo(dateString) {
        const currentDate = new Date();
        const date = new Date(dateString);
        const difference = currentDate - date;

        const seconds = Math.floor(difference / 1000);
        const minutes = Math.floor(seconds / 60);
        const hours = Math.floor(minutes / 60);
        const days = Math.floor(hours / 24);
        const weeks = Math.floor(days / 7);
        const months = Math.floor(days / 30);
        const years = Math.floor(days / 365);

        if (years > 0) {
            return years === 1 ? "1 year ago" : `${years} years ago`;
        } else if (months > 0) {
            return months === 1 ? "1 month ago" : `${months} months ago`;
        } else if (weeks > 0) {
            return weeks === 1 ? "1 week ago" : `${weeks} weeks ago`;
        } else if (days > 0) {
            return days === 1 ? "1 day ago" : `${days} days ago`;
        } else if (hours > 0) {
            return hours === 1 ? "1 hour ago" : `${hours} hours ago`;
        } else if (minutes > 0) {
            return minutes === 1 ? "1 minute ago" : `${minutes} minutes ago`;
        } else {
            return seconds === 1 ? "1 second ago" : `${seconds} seconds ago`;
        }
    }

    // Open create pixxal popup when button is clicked
    document.getElementById('createPixxalBtn').addEventListener('click', function () {
        document.getElementById('popup').style.display = 'block';
    });

    // Close popup
    function closePopup() {
        document.getElementById('popup').style.display = 'none';
    }

    // Enable or disable create button based on input fields
    function toggleCreateButton() {
        var name = document.getElementById('name').value;
        var description = document.getElementById('description').value;
        var createButton = document.getElementById('createButton');
        if (name && description) {
            createButton.disabled = false;
        } else {
            createButton.disabled = true;
        }
    }

    document.getElementById('name').addEventListener('input', toggleCreateButton);
    document.getElementById('description').addEventListener('input', toggleCreateButton);

    // Create pixxal
    document.getElementById('pixxalForm').addEventListener('submit', function (e) {
        e.preventDefault();
        var name = document.getElementById('name').value;
        var description = document.getElementById('description').value;
        var color = document.getElementById('color').value;
        var date = new Date();

        var pixxal = {
            name: name,
            description: description,
            color: color,
            date: date
        };

        var pixxals = JSON.parse(localStorage.getItem('pixxals')) || [];
        pixxals.push(pixxal);
        localStorage.setItem('pixxals', JSON.stringify(pixxals));

        closePopup();
        renderPixxals();
        document.getElementById('pixxalForm').reset();
        showSuccessMessage();
        showNotif("Pixxal created", "The pixxal " + name + " has been created successfully!")
    });

    // Render pixxals
    function renderPixxals() {
        var pixxalsContainer = document.getElementById('pixxalsContainer');
        var pixxals = JSON.parse(localStorage.getItem('pixxals')) || [];

        pixxalsContainer.innerHTML = '';

        if (pixxals.length === 0) {
            pixxalsContainer.innerHTML = '<strong><p style="text-align: center; color: #6C6E79; font-family: ">*sad trombone* No pixxals yet :c</p></strong>';
        } else {
            var sortOption = document.getElementById('sort').value;
            if (sortOption === 'newest') {
                pixxals.sort(function(a, b) {
                    return new Date(b.date) - new Date(a.date);
                });
            } else if (sortOption === 'oldest') {
                pixxals.sort(function(a, b) {
                    return new Date(a.date) - new Date(b.date);
                });
            } else if (sortOption === 'az') {
                pixxals.sort(function(a, b) {
                    return a.name.localeCompare(b.name);
                });
            }

            pixxals.forEach(function (pixxal) {
                var pixxalBlock = document.createElement('div');
                pixxalBlock.classList.add('pixxal-block');
                pixxalBlock.style.backgroundColor = '#1C1E22';
                pixxalBlock.style.margin = '10px';
                pixxalBlock.style.padding = '20px';
                pixxalBlock.style.borderRadius = '5px';
                pixxalBlock.style.borderLeft = '3px solid ' + pixxal.color;

                var name = document.createElement('h3');
                name.textContent = pixxal.name;
                name.style.fontWeight = 'bold';

                var description = document.createElement('p');
                description.textContent = pixxal.description;

                var createdAt = document.createElement('p');
                createdAt.textContent = 'Created ' + timeAgo(pixxal.date);
                createdAt.style.color = '#6C6E79';
                pixxalBlock.appendChild(name);
                pixxalBlock.appendChild(description);
                pixxalBlock.appendChild(createdAt);

                pixxalsContainer.appendChild(pixxalBlock);
            });
        }
    }

    // Event listener for sort dropdown change
    document.getElementById('sort').addEventListener('change', function() {
        renderPixxals();
    });

    // Display initial pixxals when page loads
    document.addEventListener('DOMContentLoaded', function () {
        renderPixxals();
    });

    // Function to close popup2
    function closePopup2() {
        document.getElementById('popup2').style.display = 'none';
    }

    // Function to search pixxals based on input
    function searchPixxals() {
        var searchInput = document.getElementById('search').value.toLowerCase();
        var pixxalsContainer = document.getElementById('pixxalsContainer');
        var pixxals = JSON.parse(localStorage.getItem('pixxals')) || [];
        var filteredPixxals = pixxals.filter(function(pixxal) {
            return pixxal.name.toLowerCase().includes(searchInput) || pixxal.description.toLowerCase().includes(searchInput);
        });

        pixxalsContainer.innerHTML = '';

        if (filteredPixxals.length === 0) {
            pixxalsContainer.innerHTML = '<strong><p style="text-align: center; color: #6C6E79;">Oops! That search came up empty-handed. How about looking for something else?</p></strong>';
        } else {
            filteredPixxals.forEach(function(pixxal) {
                var pixxalBlock = document.createElement('div');
                pixxalBlock.classList.add('pixxal-block');
                pixxalBlock.style.backgroundColor = '#1C1E22';
                pixxalBlock.style.margin = '10px';
                pixxalBlock.style.padding = '20px';
                pixxalBlock.style.borderRadius = '5px';
                pixxalBlock.style.borderLeft = '3px solid ' + pixxal.color;

                var name = document.createElement('h3');
                name.textContent = pixxal.name;
                name.style.fontWeight = 'bold';

                var description = document.createElement('p');
                description.textContent = pixxal.description;

                var createdAt = document.createElement('p');
                createdAt.textContent = 'Created ' + timeAgo(pixxal.date);
                createdAt.style.color = '#6C6E79';
                pixxalBlock.appendChild(name);
                pixxalBlock.appendChild(description);
                pixxalBlock.appendChild(createdAt);

                pixxalsContainer.appendChild(pixxalBlock);
            });
        }
    }
</script>

<script>

    <script>
        function showSuccessMessage() {

    <script>
    // Array of loading tips
        var tips = [
            "Grab a snack, this might take longer than making a sandwich.",
            "We're untangling the internet cables. Hang tight!",
            "Our hamsters are on overtime. Expect delays.",
            "Like watching paint dry, but with more ones and zeros.",
            "Making sure the internet gremlins are properly caffeinated.",
            "The digital hamsters are putting on their running shoes.",
            "Did you try turning it off and on again? Just kidding, we're on it!",
            "Time to play the waiting game. Hint: It's not very fun.",
            "Patience is a virtue, especially in cyberspace.",
            "It's like watching grass grow, but less green.",
            "If only the internet was as fast as our coffee maker.",
            "The internet is like a game of chess, but with a twist.",
            "Fun fact: this is actually to make the wait less frustrating"
        ];

    // Function to display a random tip
    function displayRandomTip() {
        var randomIndex = Math.floor(Math.random() * tips.length);
        document.getElementById("loadingTip").textContent = tips[randomIndex];
    }

    // Display loading screen
    function showLoadingScreen() {
        document.getElementById("loadingScreen").style.display = "block";
        displayRandomTip(); // Display a random tip

        // Set a minimum display time of 3 seconds (3000 milliseconds)
        const minimumDisplayTime = 3000;

        // Calculate the time when the loading screen should be hidden
        const hideTime = Date.now() + minimumDisplayTime;

        // Set a timeout to hide the loading screen after the minimum display time has elapsed
        const timeoutId = setTimeout(() => {
            hideLoadingScreen();
        }, minimumDisplayTime);

        // Optionally, you can listen to the "load" event of the window and clear the timeout when the page finishes loading
        window.addEventListener("load", () => {
            // Calculate the remaining time until the hideTime
            const remainingTime = hideTime - Date.now();

            // If the remaining time is greater than 0, extend the timeout to ensure the loading screen stays visible until then
            if (remainingTime > 0) {
                clearTimeout(timeoutId); // Clear the previous timeout
                setTimeout(() => {
                    hideLoadingScreen();
                }, remainingTime);
            } else {
                // If the remaining time is negative or zero, hide the loading screen immediately
                hideLoadingScreen();
            }
        });
    }

    // Hide loading screen
    function hideLoadingScreen() {
        document.getElementById("loadingScreen").style.display = "none";
    }

    // Call showLoadingScreen function when the page starts loading
    showLoadingScreen();
            
</script>
    <script>
        // Function to slide in the dropdown menu
        function showDropdownMenu() {
            var dropdownMenu = document.getElementById('dropdownMenu');
            dropdownMenu.style.left = '0';
        }

        // Function to slide out and hide the dropdown menu
        function hideDropdownMenu() {
            var dropdownMenu = document.getElementById('dropdownMenu');
            dropdownMenu.style.left = '-300px';
        }

        // Function to toggle the visibility of the dropdown menu
        function toggleDropdownMenu() {
            var dropdownMenu = document.getElementById('dropdownMenu');
            if (dropdownMenu.style.left === '-300px') {
                showDropdownMenu();
            } else {
                hideDropdownMenu();
            }
        }

        // Event listener to show dropdown menu when hamburger icon is clicked
        document.querySelector('.hamburger-icon').addEventListener('click', showDropdownMenu);

        // Event listener to hide dropdown menu when clicking anywhere on the website
        document.addEventListener('click', function(event) {
            var dropdownMenu = document.getElementById('dropdownMenu');
            var hamburgerIcon = document.querySelector('.hamburger-icon');
            var isClickInsideDropdown = dropdownMenu.contains(event.target);
            var isClickOnHamburgerIcon = hamburgerIcon.contains(event.target);
            if (!isClickInsideDropdown && !isClickOnHamburgerIcon) {
                hideDropdownMenu();
            }
        });
    </script>
    <script>
        function askPermission() {
          return new Promise(function(resolve, reject) {
            const permissionResult = Notification.requestPermission(function(result) {
              resolve(result);
            });

            if (permissionResult) {
              permissionResult.then(resolve, reject);
            }
          });
        }

        function showNotif(title = 'Default Title', content = 'Default Content') {
          if (Notification.permission === 'granted') {
            navigator.serviceWorker.ready.then(function(registration) {
              registration.showNotification(title, {
                body: content,
                icon: 'icon.png',
                badge: 'badge.png'
              });
            });
          } else if (Notification.permission !== 'denied') {
            askPermission().then(function(permissionResult) {
              if (permissionResult === 'granted') {
                navigator.serviceWorker.ready.then(function(registration) {
                  registration.showNotification(title, {
                    body: content,
                    icon: 'icon.png',
                    badge: 'badge.png'
                  });
                });
              } else {
                console.log('Permission not granted for Notification');
              }
            });
          } else {
            console.log('Permission not granted for Notification');
          }
        }
    </script>
    <script>
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.register('/service-worker.js')
            .then(function(registration) {
              console.log('Service Worker registered with scope:', registration.scope);
            })
            .catch(function(error) {
              console.error('Service Worker registration failed:', error);
            });
        }
    </script>
