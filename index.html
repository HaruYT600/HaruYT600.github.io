<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="ToyaiLabs | Gaming community">
    <meta property="og:description" content="Play games and have fun with ToyaiLabs!">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://haruyt600.github.io">
    <meta property="og:image" content="https://haruyt600.github.io/">
    <meta property="og:site_name" content="ToyaiLabs, inc">
    <link rel="icon" href="https://haruyt600.github.io/" type="image/png">
    <meta property="og:locale" content="en_US">
    
    <title>ToyaiLabs</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lilita+One&display=swap');
        body {
            font-family: 'Lilita One';
            margin: 0;
            padding: 0;
            background-color: #141C3C;
            color: white;
        }

        .header {
            background-color: #0B1022;
            color: white;
            text-align: center;
            padding: 20px 0;
        }

        .header h1 {
            margin: 0;
            font-size: 2.5em;
        }

        .description {
            text-align: center;
            margin: 20px 0;
            font-size: 1.2em;
            color: #bbb;
        }

        .games {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin: 20px 0;
        }

        .game {
            background-color: #1B214A;
            border: 2px solid #5A65EA;
            border-radius: 10px;
            margin: 10px;
            padding: 20px;
            width: 300px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .game:hover {
            transform: scale(1.05);
        }

        .game h2 {
            margin-top: 0;
            color: white;
        }

        .game p {
            color: white;
        }

        p {
            color: white;
        }

        .creator-support {
            text-align: center;
            margin: 20px 0;
        }

        .creator-support input {
            padding: 10px;
            font-size: 1em;
            font-family: 'Lilita One';
            text-align: center;
            border-top: 2px solid #CBCBD3;
            outline: 1px solid black;
        }
        .creator-support input:focus {
            outline: none;
        }

        .creator-support button {
            padding: 10px;
            font-size: 1em;
            background-color: #2B64E5;
            border-radius: 3px;
            color: white;
            border: none;
            cursor: pointer;
            font-family: 'Lilita One';
            margin-left: -2px;
            border-top: 2px solid #4496F8;
            outline: 1px solid black;
            border-bottom: 2px solid #2149E7;
        }

        .creator-support button:hover {
            transparency: 0.8;
        }

        .message {
            margin-top: 10px;
            font-size: 1em;
        }

        .message.success {
            color: #00FF00;
        }

        .message.error {
            color: #FF0000;
        }
        h1 {
            text-align: center;
        }
        p {
            text-align: center;

        }
        a {
            text-align: left;
            text-decoration: none;
            justify-content: flex-start;
            color: #2B64E5;
        }
        footer {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            background-color: #0B1022;
            }
        .link-wrapper {
            width: 50%;
            display: flex;
            justify-content: center;
        }

        .link-wrapper a {
            text-align: center;
            color: #2B64E5;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>ToyaiLabs</h1>
    </div>

    <div class="description">
        <p>ToyaiLabs makes the internet more fun :)</p>
    </div>
    <h1>OUR GAMES</h1>

    <div class="games">
        <div class="game" onclick="redirectToGame('minesweeper')">
            <h2>Minesweeper</h2>
            <p>Reveal safe tiles without triggering the bombs! </p>
        </div>
        
    </div>

    <hr>

    <div class="creator-support">
        <h2>Support Your Favorite Content Creator</h2>
        <input type="text" id="creatorCodeInput" placeholder="Enter creator code">
        <button onclick="validateCreatorCode()">ENTER</button>
        <div id="message" class="message"></div>
    </div>
<footer>
    <p>© 2024 ToyaiLabs. All rights reserved.</p>
    <div class="link-wrapper"><a href="https://discord.gg/xbxhQHGTy9">Discord Server</a></div>
    <div class="link-wrapper"><a href="https://youtube.com/@HaruYT600">YouTube</a></div>
    </footer>
    <script src="cc.js">
    </script>
</body>
</html>
