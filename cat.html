<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Cursor</title>
    <style>
        body {
            cursor: url('IMG_7452.png'), auto; /* Fallback to default cursor if image is not found */
        }
    </style>
</head>
<body>
    <h1>Custom Cursor Example</h1>
    <p>Move your cursor around to see the custom cursor effect.</p>

    <script>
        // Ensure the custom cursor works across all elements by applying the cursor style dynamically
        document.addEventListener('DOMContentLoaded', (event) => {
            document.body.style.cursor = "url('IMG_7452.png'), auto";
        });
    </script>
</body>
</html>
