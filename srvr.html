<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Bot Server List</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .server {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            padding: 10px;
            border-bottom: 1px solid #eee;
        }
        .server img {
            width: 40px;
            height: 40px;
            margin-right: 10px;
            border-radius: 5px;
        }
        .server-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            margin-right: 10px;
            background-color: #3498db;
            color: #fff;
            font-size: 20px;
            border-radius: 5px;
        }
        .server-info {
            flex-grow: 1;
        }
        .leave-button {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 3px;
        }
        .leave-button:hover {
            background-color: #c0392b;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Discord Bot Server List</h1>
        <input type="text" id="token" placeholder="Enter your bot token" style="width: 100%; padding: 10px; margin-bottom: 10px;">
        <button onclick="fetchServers()" style="width: 100%; padding: 10px;">Fetch Servers</button>
        <div id="server-list"></div>
    </div>

    <script>
        async function fetchServers() {
            const token = document.getElementById('token').value;
            const response = await fetch('https://discord.com/api/v10/users/@me/guilds', {
                headers: {
                    'Authorization': `Bot ${token}`
                }
            });

            if (!response.ok) {
                alert('Failed to fetch servers. Please check your bot token.');
                return;
            }

            const servers = await response.json();
            const serverList = document.getElementById('server-list');
            serverList.innerHTML = '';

            servers.forEach(server => {
                const serverElement = document.createElement('div');
                serverElement.className = 'server';

                if (server.icon) {
                    const iconUrl = `https://cdn.discordapp.com/icons/${server.id}/${server.icon}.png`;
                    serverElement.innerHTML = `<img src="${iconUrl}" alt="${server.name}">`;
                } else {
                    serverElement.innerHTML = `<div class="server-icon">${server.name.charAt(0)}</div>`;
                }

                serverElement.innerHTML += `
                    <div class="server-info">
                        <strong>${server.name}</strong> (ID: ${server.id})
                    </div>
                    <button class="leave-button" onclick="leaveServer('${server.id}', '${token}')">Leave</button>
                `;

                serverList.appendChild(serverElement);
            });
        }

        async function leaveServer(serverId, token) {
            const response = await fetch(`https://discord.com/api/v10/users/@me/guilds/${serverId}`, {
                method: 'DELETE',
                headers: {
                    'Authorization': `Bot ${token}`
                }
            });

            if (response.ok) {
                alert('Bot has left the server.');
                fetchServers();
            } else {
                alert('Failed to leave server.');
            }
        }
    </script>
</body>
</html>
